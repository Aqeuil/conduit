syntax = "proto3";
package kratos.api;

option go_package = "conduit/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Log log = 3;
}

message Server {
  HTTP http = 1;
  HTTP admin_http = 2;
}

message HTTP {
  string network = 1;
  string addr = 2;
  google.protobuf.Duration timeout = 3;
}


message Data {

}

message Database {
  string driver = 1;
  string source = 2;
  int32 max_idle_conns = 3;
  int32 max_open_conns = 4;
}

message Log {
  string path = 1;
  string level = 2;
  google.protobuf.Duration rotationtime = 3;
  google.protobuf.Duration maxage = 4;
}

message Redis {
  string addr = 1;
  string auth = 2;
  int32 max_idle_conns = 3;
  int32 select_db = 4;
  google.protobuf.Duration idle_timeout = 5;
  google.protobuf.Duration dial_connect_timeout = 6;
  google.protobuf.Duration dial_read_timeout = 7;
  google.protobuf.Duration dial_write_timeout = 8;
}

message Oss {
  string ali_oss_access_key = 1;
  string ali_oss_key_secret = 2;
  string ali_oss_bucket = 3;
  string ali_oss_endpoint = 4;
  string ali_oss_cdn = 6;
  string ali_oss_dir = 7;
}
